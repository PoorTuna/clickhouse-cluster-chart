{{- include "clickhouse-cluster.validate" . }}
{{- if .Values.clickhouseCluster.enabled }}
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: {{ include "clickhouse-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse-cluster.labels" . | nindent 4 }}
    {{- with .Values.clickhouseCluster.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- $annot := include "clickhouse-cluster.renderAnnotations" (dict "common" .Values.commonAnnotations "extra" .Values.clickhouseCluster.annotations) }}
  {{- if $annot }}
  annotations:
    {{- $annot | nindent 4 }}
  {{- end }}
spec:
  shards: {{ .Values.clickhouseCluster.shards }}
  replicas: {{ .Values.clickhouseCluster.replicas }}

  {{- with .Values.clickhouseCluster.clusterDomain }}
  clusterDomain: {{ . | quote }}
  {{- end }}

  {{- with .Values.clickhouseCluster.upgradeChannel }}
  upgradeChannel: {{ . | quote }}
  {{- end }}

  keeperClusterRef:
    name: {{ include "clickhouse-cluster.keeperRef" . }}

  {{- with .Values.clickhouseCluster.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with .Values.clickhouseCluster.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- $ct := .Values.clickhouseCluster.containerTemplate }}
  {{- if or $ct.image.repository $ct.image.tag $ct.image.pullPolicy $ct.resources $ct.env $ct.securityContext $ct.volumeMounts }}
  containerTemplate:
    {{- if or $ct.image.repository $ct.image.tag }}
    image:
      {{- with $ct.image.repository }}
      repository: {{ . | quote }}
      {{- end }}
      {{- with $ct.image.tag }}
      tag: {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- with $ct.image.pullPolicy }}
    imagePullPolicy: {{ . }}
    {{- end }}
    {{- with $ct.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $ct.env }}
    env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $ct.securityContext }}
    securityContext:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $ct.volumeMounts }}
    volumeMounts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- with .Values.clickhouseCluster.dataVolumeClaimSpec }}
  dataVolumeClaimSpec:
    {{- with .accessModes }}
    accessModes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .storageClassName }}
    storageClassName: {{ . | quote }}
    {{- end }}
    {{- with .resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- if .Values.clickhouseCluster.podDisruptionBudget.enabled }}
  podDisruptionBudget:
    {{- with .Values.clickhouseCluster.podDisruptionBudget.minAvailable }}
    minAvailable: {{ . }}
    {{- end }}
    {{- with .Values.clickhouseCluster.podDisruptionBudget.maxUnavailable }}
    maxUnavailable: {{ . }}
    {{- end }}
    {{- with .Values.clickhouseCluster.podDisruptionBudget.policy }}
    policy: {{ . }}
    {{- end }}
    {{- with .Values.clickhouseCluster.podDisruptionBudget.unhealthyPodEvictionPolicy }}
    unhealthyPodEvictionPolicy: {{ . }}
    {{- end }}
  {{- end }}

  {{- $pt := .Values.clickhouseCluster.podTemplate }}
  {{- if or $pt.affinity $pt.nodeSelector $pt.tolerations $pt.topologySpreadConstraints $pt.priorityClassName $pt.securityContext $pt.imagePullSecrets $pt.initContainers $pt.volumes $pt.terminationGracePeriodSeconds }}
  podTemplate:
    {{- with $pt.affinity }}
    affinity:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.topologySpreadConstraints }}
    topologySpreadConstraints:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.priorityClassName }}
    priorityClassName: {{ . | quote }}
    {{- end }}
    {{- with $pt.securityContext }}
    securityContext:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.imagePullSecrets }}
    imagePullSecrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.initContainers }}
    initContainers:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.volumes }}
    volumes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $pt.terminationGracePeriodSeconds }}
    terminationGracePeriodSeconds: {{ . }}
    {{- end }}
  {{- end }}

  settings:
    enableDatabaseSync: {{ .Values.clickhouseCluster.settings.enableDatabaseSync }}

    {{- if .Values.clickhouseCluster.settings.defaultUserPassword.enabled }}
    defaultUserPassword:
      {{- with .Values.clickhouseCluster.settings.defaultUserPassword.passwordType }}
      passwordType: {{ . }}
      {{- end }}
      {{- if and .Values.clickhouseCluster.settings.defaultUserPassword.secret .Values.clickhouseCluster.settings.defaultUserPassword.secret.name }}
      secret:
        name: {{ .Values.clickhouseCluster.settings.defaultUserPassword.secret.name }}
        key: {{ .Values.clickhouseCluster.settings.defaultUserPassword.secret.key | default "password" }}
      {{- else if .Values.secrets.defaultUserPassword.enabled }}
      secret:
        name: {{ include "clickhouse-cluster.defaultUserPasswordSecretName" . }}
        key: password
      {{- else if and .Values.clickhouseCluster.settings.defaultUserPassword.configMap .Values.clickhouseCluster.settings.defaultUserPassword.configMap.name }}
      configMap:
        name: {{ .Values.clickhouseCluster.settings.defaultUserPassword.configMap.name }}
        key: {{ .Values.clickhouseCluster.settings.defaultUserPassword.configMap.key | default "password" }}
      {{- end }}
    {{- end }}

    logger:
      level: {{ .Values.clickhouseCluster.settings.logger.level }}
      {{- if not (eq (toString .Values.clickhouseCluster.settings.logger.logToFile) "") }}
      logToFile: {{ .Values.clickhouseCluster.settings.logger.logToFile }}
      {{- end }}
      {{- with .Values.clickhouseCluster.settings.logger.size }}
      size: {{ . | quote }}
      {{- end }}
      {{- with .Values.clickhouseCluster.settings.logger.count }}
      count: {{ . }}
      {{- end }}
      {{- if .Values.clickhouseCluster.settings.logger.jsonLogs }}
      jsonLogs: {{ .Values.clickhouseCluster.settings.logger.jsonLogs }}
      {{- end }}

    {{- if .Values.clickhouseCluster.settings.tls.enabled }}
    tls:
      enabled: true
      {{- if .Values.clickhouseCluster.settings.tls.required }}
      required: true
      {{- end }}
      {{- if or .Values.clickhouseCluster.settings.tls.serverCertSecret.name (and .Values.secrets.tls.enabled .Values.secrets.tls.create) }}
      serverCertSecret:
        {{- if .Values.clickhouseCluster.settings.tls.serverCertSecret.name }}
        name: {{ .Values.clickhouseCluster.settings.tls.serverCertSecret.name }}
        {{- else }}
        name: {{ include "clickhouse-cluster.tlsSecretName" . }}
        {{- end }}
      {{- end }}
      {{- if or .Values.clickhouseCluster.settings.tls.caBundle.name (and .Values.secrets.tls.enabled .Values.secrets.tls.create .Values.secrets.tls.caBundle) }}
      caBundle:
        {{- if .Values.clickhouseCluster.settings.tls.caBundle.name }}
        name: {{ .Values.clickhouseCluster.settings.tls.caBundle.name }}
        key: {{ .Values.clickhouseCluster.settings.tls.caBundle.key | default "ca.crt" }}
        {{- else }}
        name: {{ include "clickhouse-cluster.tlsSecretName" . }}
        key: ca.crt
        {{- end }}
      {{- end }}
    {{- end }}

    {{- with .Values.clickhouseCluster.settings.extraConfig }}
    extraConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- with .Values.clickhouseCluster.settings.extraUsersConfig }}
    extraUsersConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
