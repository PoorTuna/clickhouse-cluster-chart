{{- if and .Values.tests.enabled .Values.clickhouseCluster.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "clickhouse-cluster.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse-cluster.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: clickhouse-client
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing ClickHouse connection..."
          clickhouse-client \
            --host {{ include "clickhouse-cluster.fullname" . }}-clickhouse-headless \
            --port 9000 \
            --query "SELECT 1"
          echo "Connection test passed."
{{- end }}
