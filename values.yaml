# Requires the clickhouse-operator chart to be installed first.
# Reference: https://clickhouse.com/docs/en/guides/sre/keeper/clickhouse-keeper

# -- Override the chart name used in resource metadata.
nameOverride: ""

# -- Override the full release name used in resource metadata.
fullnameOverride: ""

# -- Override the KeeperCluster CR name. Defaults to the release name.
keeperFullnameOverride: ""

# -- Common labels applied to all resources.
commonLabels: {}

# -- Common annotations applied to all resources.
commonAnnotations: {}

# -- ClickHouseCluster CR (clickhouse.com/v1alpha1)
clickhouseCluster:
  # -- Whether to create the ClickHouseCluster CR.
  enabled: true

  # -- Additional labels for the resource.
  labels: {}

  # -- Additional annotations for the resource.
  annotations: {}

  # -- Kubernetes cluster domain suffix for DNS.
  clusterDomain: cluster.local

  # -- Number of shards. Each shard holds a portion of the data.
  shards: 1

  # -- Number of replicas per shard.
  replicas: 2

  # -- Upgrade channel: "" (disabled), "lts", "stable", or "X.Y".
  upgradeChannel: ""

  # -- Reference to KeeperCluster. Auto-derived if empty and keeperCluster.enabled.
  keeperClusterRef:
    name: ""

  # -- ClickHouse container spec.
  containerTemplate:
    image:
      # -- Image repository. Empty = operator default.
      repository: ""
      # -- Image tag. Empty = operator default.
      tag: ""
      # -- Image pull policy.
      pullPolicy: IfNotPresent

    # -- Resource requests and limits.
    resources: {}
    # requests:
    #   cpu: "2"
    #   memory: "4Gi"
    # limits:
    #   cpu: "4"
    #   memory: "8Gi"

    # -- Environment variables.
    env: []
    # - name: TZ
    #   value: "UTC"

    # -- Container security context.
    securityContext: {}

    # -- Additional volume mounts.
    volumeMounts: []
    # - name: extra-config
    #   mountPath: /etc/clickhouse-server/config.d/extra.xml
    #   subPath: extra.xml

  # -- PVC spec for ClickHouse data.
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    # -- Storage class. Empty = cluster default.
    storageClassName: ""
    resources:
      requests:
        storage: 100Gi

  # -- Pod disruption budget.
  podDisruptionBudget:
    enabled: false
    # -- Mutually exclusive with maxUnavailable.
    minAvailable: ""
    # -- Mutually exclusive with minAvailable.
    maxUnavailable: 1
    # -- Valid: "Enabled", "Disabled", "Ignored"
    policy: Enabled
    unhealthyPodEvictionPolicy: ""

  # -- Pod-level configuration.
  podTemplate:
    affinity: {}
    # podAntiAffinity:
    #   requiredDuringSchedulingIgnoredDuringExecution:
    #     - labelSelector:
    #         matchLabels:
    #           app.kubernetes.io/name: clickhouse
    #       topologyKey: kubernetes.io/hostname

    nodeSelector: {}
    # node-role.kubernetes.io/clickhouse: ""

    tolerations: []
    # - key: "dedicated"
    #   operator: "Equal"
    #   value: "clickhouse"
    #   effect: "NoSchedule"

    topologySpreadConstraints: []
    # - maxSkew: 1
    #   topologyKey: topology.kubernetes.io/zone
    #   whenUnsatisfiable: DoNotSchedule
    #   labelSelector:
    #     matchLabels:
    #       app.kubernetes.io/name: clickhouse

    priorityClassName: ""

    securityContext: {}
    # fsGroup: 101
    # runAsNonRoot: true

    imagePullSecrets: []
    # - name: my-registry-secret

    initContainers: []

    volumes: []
    # - name: extra-config
    #   configMap:
    #     name: clickhouse-extra-config

    terminationGracePeriodSeconds: 60

  # -- ClickHouse server settings.
  settings:
    # -- Sync databases on scale.
    enableDatabaseSync: true

    # -- Default user password.
    defaultUserPassword:
      enabled: false
      # -- Valid: "password", "plaintext_password", "sha256_password",
      # "double_sha1_password", "bcrypt_password"
      passwordType: sha256_password
      # -- Secret ref. Auto-derived if secrets.defaultUserPassword.create is true.
      secret:
        name: ""
        key: password
      # -- ConfigMap ref (alternative to secret).
      configMap:
        name: ""
        key: ""

    # -- Logger.
    logger:
      # -- Valid: "test", "trace", "debug", "information", "notice",
      # "warning", "error", "critical", "fatal"
      level: information
      logToFile: true
      size: 1000M
      count: 50
      jsonLogs: false

    # -- TLS for server connections.
    tls:
      enabled: false
      required: false
      serverCertSecret:
        name: ""
        key: ""
      caBundle:
        name: ""
        key: ""

    # -- Extra server config (merged with defaults).
    extraConfig: {}
    # merge_tree:
    #   max_suspicious_broken_parts: 5
    # query_log:
    #   partition_by: toYYYYMM(event_date)

    # -- Extra users config (merged with defaults).
    extraUsersConfig: {}
    # users:
    #   readonly:
    #     profile: readonly
    #     quota: default

# -- KeeperCluster CR (clickhouse.com/v1alpha1)
# Disable to use an external Keeper or ZooKeeper.
keeperCluster:
  enabled: true

  labels: {}
  annotations: {}

  clusterDomain: cluster.local

  # -- Must be odd for quorum. Valid: 0, 1, 3, 5, 7, 9, 11, 13, 15
  replicas: 3

  # -- Upgrade channel: "" (disabled), "lts", "stable", or "X.Y".
  upgradeChannel: ""

  # -- Keeper container spec.
  containerTemplate:
    image:
      repository: ""
      tag: ""
      pullPolicy: IfNotPresent

    resources: {}
    # requests:
    #   cpu: "500m"
    #   memory: "1Gi"
    # limits:
    #   cpu: "1"
    #   memory: "2Gi"

    env: []
    securityContext: {}
    volumeMounts: []

  # -- PVC spec for Keeper data.
  dataVolumeClaimSpec:
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    resources:
      requests:
        storage: 20Gi

  # -- Pod disruption budget.
  podDisruptionBudget:
    enabled: false
    minAvailable: ""
    maxUnavailable: 1
    policy: Enabled
    unhealthyPodEvictionPolicy: ""

  # -- Pod-level configuration.
  podTemplate:
    affinity: {}
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    priorityClassName: ""
    securityContext: {}
    imagePullSecrets: []
    initContainers: []
    volumes: []
    terminationGracePeriodSeconds: 30

  # -- Keeper settings.
  settings:
    logger:
      level: information
      logToFile: true
      size: 1000M
      count: 50
      jsonLogs: false

    tls:
      enabled: false
      required: false
      serverCertSecret:
        name: ""
        key: ""
      caBundle:
        name: ""
        key: ""

    extraConfig: {}

# -- Managed Secrets.
# Create Secrets for default user password and/or TLS certs.
# Disable to manage secrets externally.
secrets:
  defaultUserPassword:
    enabled: false
    # -- Set to false to reference an existing secret.
    create: true
    # -- Auto-derived from release name if empty.
    name: ""
    # -- Password value (stored as-is).
    password: ""

  tls:
    enabled: false
    create: true
    name: ""
    # -- PEM-encoded values.
    cert: ""
    key: ""
    caBundle: ""

# -- ServiceMonitor for ClickHouse pods (requires prometheus-operator).
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  port: metrics
  path: /metrics
  scheme: http
  # -- Labels for Prometheus serviceMonitorSelector matching.
  labels: {}
  relabelings: []
  metricRelabelings: []
  tlsConfig: {}
  # -- Custom selector. Auto-generated if empty.
  selector: {}

# -- ServiceMonitor for Keeper pods (requires prometheus-operator).
keeperServiceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  port: metrics
  path: /metrics
  scheme: http
  labels: {}
  relabelings: []
  metricRelabelings: []
  tlsConfig: {}
  selector: {}

# -- PrometheusRule with bundled alerts (requires prometheus-operator).
prometheusRule:
  enabled: false
  namespace: ""
  labels: {}
  defaultRules:
    # -- Bundled alerts: ClusterUnready, ReplicaDown, ReplicationLag,
    # KeeperSessionExpired, DiskUsageHigh, QueryFailureRate
    enabled: true
  # -- Additional user-defined rules.
  additionalRules: []
  # - alert: ClickHouseSlowQueries
  #   expr: rate(ClickHouseProfileEvents_SlowRead[5m]) > 0.1
  #   for: 10m
  #   labels:
  #     severity: warning
  #   annotations:
  #     summary: "ClickHouse slow queries detected"

# -- Grafana dashboard ConfigMap (auto-discovered by sidecar).
grafanaDashboard:
  enabled: false
  labels:
    grafana_dashboard: "1"
  annotations: {}
  folder: ""
  # -- Custom dashboard JSON. Empty = bundled default.
  dashboardJson: ""

# -- NetworkPolicy for ClickHouse and Keeper pods.
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress:
    fromNamespaces: []
    # - matchLabels:
    #     name: my-app-namespace
    fromPodSelector: {}
    # -- Auto-allow traffic from Keeper pods.
    allowKeeper: true
  egress:
    toCIDRs: []
    # - 10.0.0.0/8
    # -- Allow DNS resolution.
    allowDNS: true

# -- Extra manifests (supports tpl).
extraManifests: []
# - |
#   apiVersion: v1
#   kind: ConfigMap
#   metadata:
#     name: clickhouse-extra-config
#     namespace: {{ .Release.Namespace }}
#   data:
#     extra.xml: |
#       <clickhouse>
#         <merge_tree>
#           <max_suspicious_broken_parts>5</max_suspicious_broken_parts>
#         </merge_tree>
#       </clickhouse>

# -- Helm test configuration (run via `helm test <release>`).
tests:
  enabled: true
  image:
    repository: clickhouse/clickhouse-client
    tag: "24.8"
    pullPolicy: IfNotPresent
  keeperImage:
    repository: clickhouse/clickhouse-keeper
    tag: "24.8"
    pullPolicy: IfNotPresent
